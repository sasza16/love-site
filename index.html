<!DOCTYPE html>
<html>
<head>
  <title>Для Анечки ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to top, #ff9a9e, #fad0c4);
      font-family: Arial;
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
      animation: fadeIn 2s;
    }

    p {
      font-size: 20px;
      animation: fadeIn 4s;
    }

    .heart {
      font-size: 60px;
      animation: pulse 1s infinite;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 15px;
      background: white;
      color: #ff6b81;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .falling {
      position: absolute;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }
  </style>

</head>

<body>

  <h1>Анечка 💖</h1>

  <p>
    Ты самая милая и красивая 🥺<br>
    С тобой мне очень хорошо<br>
    Ты делаешь мой день лучше ☀️<br><br>
    — Саша 💌
  </p>

  <div class="heart">💋</div>

  <button onclick="showText()">Нажми 💕</button>

  <p id="hidden" style="display:none; font-size:22px;">
    Я тебя очень люблю, Анечка 😘
  </p>

  <script>
    function showText() {
      document.getElementById("hidden").style.display = "block";
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("falling");
      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (3 + Math.random() * 5) + "s";
      heart.style.fontSize = (15 + Math.random() * 20) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
